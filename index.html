<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منطقي الرياضي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0EEFF;--surface:#fff;--primary:#7C3AED;--pl:#EDE9FE;
  --sec:#0EA5E9;--secl:#E0F2FE;--acc:#EC4899;--accl:#FCE7F3;
  --gold:#F59E0B;--goldl:#FEF3C7;--text:#1E1B4B;--ts:#64748B;
  --border:#E2E8F0;--ok:#059669;--okl:#D1FAE5;--err:#DC2626;--errl:#FEE2E2;
  --sh:0 4px 24px rgba(124,58,237,.12);--r:16px;
}
[data-theme="dark"]{
  --bg:#130F2A;--surface:#1E1B4B;--primary:#A78BFA;--pl:#2D2B6B;
  --sec:#38BDF8;--secl:#1E3A52;--acc:#F9A8D4;--accl:#4A1A3A;
  --gold:#FCD34D;--goldl:#3A2E00;--text:#EEF2FF;--ts:#94A3B8;
  --border:#312E81;--ok:#34D399;--okl:#064E3B;--err:#F87171;--errl:#450A0A;
  --sh:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;line-height:1.6}
.hidden{display:none!important}
/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--sh);position:sticky;top:0;z-index:100;transition:background .3s}
.nav-logo{font-size:1.15rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn-theme{background:var(--pl);border:none;border-radius:50px;padding:8px 18px;cursor:pointer;font-size:.88rem;color:var(--primary);font-family:inherit;font-weight:700;transition:.2s}
.btn-theme:hover{background:var(--primary);color:#fff}
/* HOME */
#home{max-width:940px;margin:0 auto;padding:28px 16px}
.hero{text-align:center;padding:36px 0 24px}
.hero h1{font-size:clamp(1.7rem,4vw,2.5rem);font-weight:800;background:linear-gradient(135deg,var(--primary),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.hero p{color:var(--ts);max-width:520px;margin:0 auto;font-size:.93rem}
.stats-bar{display:flex;justify-content:space-around;background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:24px;box-shadow:var(--sh)}
.stat{text-align:center}
.stat-num{font-size:1.5rem;font-weight:800;color:var(--primary)}
.stat-label{font-size:.72rem;color:var(--ts)}
.levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.level-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:22px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.level-card:not(.locked):hover{transform:translateY(-4px);box-shadow:var(--sh);border-color:var(--primary)}
.level-card.locked{opacity:.5;cursor:not-allowed}
.lbadge{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:12px;font-size:1.4rem;margin-bottom:10px}
.b1{background:var(--secl);} .b2{background:var(--pl);} .b3{background:var(--accl);} .b4{background:var(--goldl);} .b5{background:#D1FAE5;}
.level-title{font-size:.97rem;font-weight:700;margin-bottom:4px}
.level-desc{font-size:.8rem;color:var(--ts);margin-bottom:14px}
.lbar{background:var(--pl);border-radius:4px;height:7px;overflow:hidden}
.lbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--acc));transition:width .6s}
.lstats{display:flex;justify-content:space-between;margin-top:8px;font-size:.76rem;color:var(--ts)}
.lock-msg{font-size:.78rem;color:var(--ts);margin-top:6px}
.weak-hint{font-size:.75rem;margin-top:6px;padding:3px 10px;border-radius:6px;background:var(--errl);color:var(--err);display:inline-block}
/* EXERCISE */
#exercise{max-width:720px;margin:0 auto;padding:24px 16px}
.ex-top{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.btn-back{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 14px;cursor:pointer;color:var(--text);font-family:inherit;font-size:.88rem;white-space:nowrap;transition:.2s}
.btn-back:hover{border-color:var(--primary);color:var(--primary)}
.ex-bar-wrap{flex:1}
.ex-bar{background:var(--pl);height:8px;border-radius:4px;overflow:hidden}
.ex-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--acc));transition:width .4s}
.ex-count{font-size:.78rem;color:var(--ts);margin-top:4px;text-align:center}
.adapt-badge{display:inline-block;background:var(--goldl);color:#92400E;font-size:.73rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
[data-theme="dark"] .adapt-badge{color:var(--gold)}
.ex-card{background:var(--surface);border-radius:var(--r);padding:26px;box-shadow:var(--sh)}
.dchip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.76rem;font-weight:700;margin-bottom:14px}
.dc-اقتصاد{background:var(--secl);color:var(--sec)}
.dc-ميكانيك{background:var(--goldl);color:#92400E}
.dc-كهرباء{background:var(--accl);color:var(--acc)}
.dc-رياضيات{background:var(--pl);color:var(--primary)}
.dc-يومية{background:#FEF3C7;color:#92400E}
[data-theme="dark"] .dc-يومية{color:#FCD34D;background:#3A2E00}
.dc-منطق{background:#F3E8FF;color:#7C3AED}
[data-theme="dark"] .dc-منطق{color:#A78BFA;background:#2D1B69}
[data-theme="dark"] .dc-ميكانيك{color:var(--gold)}
[data-theme="dark"] .dc-كيمياء{color:#34D399}
.sbox{background:var(--goldl);border-right:4px solid var(--gold);border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:.93rem;line-height:1.75}
.slabel{font-size:.7rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.question{font-size:1rem;font-weight:700;margin-bottom:18px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:13px 16px;text-align:right;cursor:pointer;font-family:inherit;font-size:.9rem;color:var(--text);transition:.18s;line-height:1.45}
.opt:hover:not(:disabled){border-color:var(--primary);background:var(--pl)}
.opt.correct{border-color:var(--ok)!important;background:var(--okl)!important;color:var(--ok)!important;font-weight:700}
.opt.wrong{border-color:var(--err)!important;background:var(--errl)!important;color:var(--err)!important;font-weight:700}
.opt:disabled{cursor:default}
.num-wrap{display:flex;flex-direction:column;gap:10px}
.num-row{display:flex;gap:10px;align-items:center}
.num-input{flex:1;padding:13px;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:1.1rem;background:var(--bg);color:var(--text);text-align:center;transition:.2s;direction:ltr}
.num-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--pl)}
.num-input.correct{border-color:var(--ok);background:var(--okl)}
.num-input.wrong{border-color:var(--err);background:var(--errl)}
.unit{color:var(--ts);font-size:.88rem;white-space:nowrap;min-width:44px}
.btn-check{width:100%;background:linear-gradient(135deg,var(--primary),var(--acc));color:#fff;border:none;border-radius:12px;padding:13px;cursor:pointer;font-family:inherit;font-size:.93rem;font-weight:700;transition:.2s}
.btn-check:hover:not(:disabled){opacity:.88;transform:scale(1.01)}
.btn-check:disabled{opacity:.5;cursor:not-allowed}
.hint-area{margin-top:8px}
.btn-hint{background:none;border:1px dashed var(--gold);color:var(--gold);border-radius:8px;padding:5px 14px;cursor:pointer;font-family:inherit;font-size:.8rem;transition:.2s}
.btn-hint:hover{background:var(--goldl)}
.hint-text{display:none;margin-top:8px;padding:10px 14px;background:var(--goldl);border-radius:10px;font-size:.86rem;line-height:1.6}
.hint-text.show{display:block}
.feedback{display:none;border-radius:12px;padding:16px 18px;margin-top:16px;animation:fadeIn .3s}
.feedback.show{display:block}
.feedback.ok{background:var(--okl);border:2px solid var(--ok)}
.feedback.err{background:var(--errl);border:2px solid var(--err)}
.fb-header{font-weight:800;font-size:.97rem;margin-bottom:6px}
.feedback.ok .fb-header{color:var(--ok)}
.feedback.err .fb-header{color:var(--err)}
.fb-exp{font-size:.86rem;line-height:1.65;color:var(--text)}
.btn-next{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--primary),var(--acc));color:#fff;border:none;border-radius:12px;padding:13px;cursor:pointer;font-family:inherit;font-size:.93rem;font-weight:700;transition:.2s}
.btn-next:hover{opacity:.88}
/* COMPLETE */
#complete{max-width:520px;margin:0 auto;padding:52px 16px;text-align:center}
.c-icon{font-size:4.5rem;margin-bottom:16px;animation:bounce .6s}
.c-title{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.c-sub{color:var(--ts);margin-bottom:16px;font-size:.92rem}
.stars{font-size:2rem;margin-bottom:8px;letter-spacing:4px}
.score-chip{display:inline-block;padding:8px 20px;border-radius:50px;background:var(--pl);color:var(--primary);font-weight:800;font-size:1rem;margin-bottom:20px}
.weak-report{text-align:right;background:var(--surface);border-radius:12px;padding:16px;margin-bottom:20px;font-size:.86rem;box-shadow:var(--sh)}
.weak-report h3{font-size:.88rem;margin-bottom:8px;color:var(--err)}
.weak-item{padding:3px 0;color:var(--ts)}
.btn-p{background:linear-gradient(135deg,var(--primary),var(--acc));color:#fff;border:none;border-radius:12px;padding:13px 28px;cursor:pointer;font-family:inherit;font-size:.93rem;font-weight:700;margin:6px;transition:.2s}
.btn-p:hover{opacity:.88}
.btn-s{background:var(--pl);color:var(--primary);border:none;border-radius:12px;padding:13px 28px;cursor:pointer;font-family:inherit;font-size:.93rem;font-weight:700;margin:6px;transition:.2s}
.btn-s:hover{background:var(--primary);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.btn-preview{background:none;border:1px dashed var(--ts);color:var(--ts);border-radius:10px;padding:8px 20px;cursor:pointer;font-family:inherit;font-size:.8rem;transition:.2s}
.btn-skip{background:none;border:1px dashed var(--ts);color:var(--ts);border-radius:8px;padding:5px 14px;cursor:pointer;font-family:inherit;font-size:.78rem;transition:.2s}
.btn-skip:hover{border-color:var(--acc);color:var(--acc)}
.btn-preview:hover{border-color:var(--primary);color:var(--primary)}
.btn-preview.active{background:var(--errl);border-color:var(--err);color:var(--err)}
/* INFO CARD */
.btn-info{background:none;border:1px solid var(--sec);color:var(--sec);border-radius:8px;padding:5px 14px;cursor:pointer;font-family:inherit;font-size:.8rem;margin-bottom:14px;transition:.2s}
.btn-info:hover{background:var(--secl)}
.info-card{display:none;background:var(--secl);border:1px solid var(--sec);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:.86rem;line-height:1.8;white-space:pre-line}
.info-card.show{display:block}
/* Phase labels */
.phase-badge{display:inline-block;background:var(--pl);color:var(--primary);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
@media(max-width:480px){nav{padding:12px 14px}.ex-card{padding:18px 14px}.stats-bar{gap:0}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">🧠 منطقي الرياضي</div>
  <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">🌙 داكن</button>
</nav>

<div id="home">
  <div class="hero">
    <h1>بناء المنطق الرياضي</h1>
    <p>تدرّبي على استنتاج العلاقات الرياضية تلقائياً — اقتصاد، فيزياء، رياضيات، كيمياء</p>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="st-done">0</div><div class="stat-label">تمرين أُنجز</div></div>
    <div class="stat"><div class="stat-num" id="st-cor">0</div><div class="stat-label">إجابة صحيحة</div></div>
    <div class="stat"><div class="stat-num" id="st-pct">—</div><div class="stat-label">معدل النجاح</div></div>
    <div class="stat"><div class="stat-num" id="st-str">🔥0</div><div class="stat-label">سلسلة صحيحة</div></div>
  </div>
  <div class="levels-grid" id="levels-grid"></div>
  <div style="text-align:center;margin-top:20px">
    <button class="btn-preview" id="preview-btn" onclick="togglePreview()">🔓 وضع المعاينة — افتح جميع المستويات</button>
  </div>
</div>

<div id="exercise" class="hidden">
  <div class="ex-top">
    <button class="btn-back" onclick="backHome()">← رجوع</button>
    <div class="ex-bar-wrap">
      <div class="ex-bar"><div class="ex-bar-fill" id="ex-fill" style="width:0%"></div></div>
      <div class="ex-count" id="ex-count"></div>
    </div>
  </div>
  <div id="adapt-wrap"></div>
  <div class="ex-card">
    <div class="dchip" id="ex-domain"></div>
    <div class="phase-badge" id="phase-badge" style="display:none"></div>
    <div id="info-wrap"></div>
    <div class="sbox"><div class="slabel">الموقف</div><div id="ex-sit"></div></div>
    <div class="question" id="ex-q"></div>
    <div id="ex-ans"></div>
    <div style="text-align:left;margin-top:10px">
      <button class="btn-skip" id="btn-skip" onclick="skipEx()">تخطي ◁</button>
    </div>
    <div class="feedback" id="ex-fb">
      <div class="fb-header" id="fb-h"></div>
      <div class="fb-exp" id="fb-e"></div>
      <button class="btn-next" onclick="nextEx()">التمرين التالي ←</button>
    </div>
  </div>
</div>

<div id="complete" class="hidden">
  <div class="c-icon" id="c-icon"></div>
  <div class="c-title" id="c-title"></div>
  <div class="c-sub" id="c-sub"></div>
  <div class="stars" id="c-stars"></div>
  <div class="score-chip" id="c-score"></div>
  <div class="weak-report" id="c-weak"></div>
  <button class="btn-p" onclick="backHome()">العودة للرئيسية</button>
  <button class="btn-s" onclick="retryLv()">إعادة هذا المستوى 🔄</button>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════
//  DATABASE — 150 EXERCISES
// ══════════════════════════════════════════════
const DB=[
// ─────────── LEVEL 1 ───────────
// ══════════════════════════════════════════════════════════
//  LEVEL 1 — بناء المسار الصحيح
//  المرحلة أ (1-10): خطوة واحدة — تدرج حقيقي في الصعوبة
//  المرحلة ب (11-15): خطوتان
//  المرحلة ج (16-20): سلسلة كاملة
// ══════════════════════════════════════════════════════════

// ── المرحلة أ — تمارين 1-3: الكميتان مذكورتان صراحةً ──

{id:1,level:1,domain:"حياة يومية",
situation:"اشتريتِ 6 دفاتر، كل دفتر بـ 25 دج.",
info:"📌 المبلغ الإجمالي = سعر القطعة × عدد القطع\n→ في الاقتصاد: رقم الأعمال (CA) = السعر (P) × الكمية (Q)",
question:"أي عملية تستعملين لإيجاد المبلغ الإجمالي؟",
type:"mcq",options:["ضرب: 25 × 6","جمع: 25 + 6","قسمة: 25 ÷ 6","طرح: 25 − 6"],answer:0,
hint:"كل دفتر = 25 دج. عدد الدفاتر = 6.",
explanation:"25 × 6 = 150 دج. نضرب لأن كل وحدة لها سعر ثابت. هذا هو CA = P × Q."},

{id:2,level:1,domain:"حياة يومية",
situation:"بعتِ 30 كوب عصير بـ 50 دج للكوب. وكانت تكلفة مواد الإنتاج الإجمالية 420 دج.",
info:"📌 الربح = المال المجموع − ما أُنفق\n→ في الاقتصاد: نتيجة الاستغلال (R) = رقم الأعمال (CA) − التكاليف الإجمالية (CT)",
question:"أي عملية تستعملين لإيجاد الربح؟",
type:"mcq",options:["طرح: (30×50) − 420","جمع: (30×50) + 420","قسمة: (30×50) ÷ 420","ضرب: 30 × 50 × 420"],answer:0,
hint:"الربح = ما دخل − ما خرج.",
explanation:"CA = 1500 دج. الربح = 1500 − 420 = 1080 دج. R = CA − CT."},

{id:3,level:1,domain:"حياة يومية",
situation:"اشتريتِ علبة بـ 300 دج وبعتِها بـ 450 دج.",
info:"📌 الربح على القطعة = سعر البيع − تكلفة الشراء\n→ في الاقتصاد: هامش الوحدة (m) = P − cv",
question:"أي عملية تستعملين لإيجاد ما ربحتِه على هذه العلبة؟",
type:"mcq",options:["طرح: 450 − 300","جمع: 450 + 300","ضرب: 450 × 300","قسمة: 450 ÷ 300"],answer:0,
hint:"ربح الوحدة = ما بعتِه − ما اشتريتِه.",
explanation:"m = 450 − 300 = 150 دج. هذا هو هامش الوحدة = P − cv."},

// ── تمارين 4-6: تحددين الكميتين بنفسك من النص ──

{id:4,level:1,domain:"حياة يومية",
situation:"تبيعين فطائر منزلية. كل فطيرة تكلف موادها 45 دج وتبيعينها بـ 70 دج. هذا الأسبوع بعتِ 40 فطيرة وكانت أجرة توصيلك 200 دج.",
info:"📌 هامش الوحدة (m) = سعر البيع (P) − تكلفة المواد للوحدة (cv)\nرقم الأعمال (CA) = P × Q",
question:"لمعرفة كم ربحتِ على كل فطيرة، أي كميتين تستعملين؟",
type:"mcq",options:["70 و 45 فقط (سعر البيع وتكلفة المواد)","70 و 40 (السعر والكمية المباعة)","45 و 40 (تكلفة المواد والكمية)","70 و 200 (السعر والتوصيل)"],answer:0,
hint:"هامش الوحدة لا علاقة له بالكمية ولا بالتوصيل.",
explanation:"m = 70 − 45 = 25 دج. الـ 200 دج أجرة توصيل هي تكلفة ثابتة تُستخدم لاحقاً لحساب الربح الإجمالي، لكن هامش الوحدة = P − cv فقط."},

{id:5,level:1,domain:"حياة يومية",
situation:"صديقتك تبيع مجوهرات يدوية. قالت لكِ: سعر القطعة 800 دج، وقد باعت هذا الشهر 25 قطعة، والمواد الخام كلّفتها 4500 دج للشهر كله، وأجرة التغليف 300 دج للشهر.",
info:"📌 رقم الأعمال (CA) = سعر البيع (P) × الكمية المباعة (Q)\nلا علاقة لـ CA بالتكاليف",
question:"لحساب رقم الأعمال فقط، أي كميتين تستعملين؟",
type:"mcq",options:["800 و 25 (السعر والكمية)","4500 و 25 (المواد والكمية)","800 و 4500 (السعر والمواد)","800 و 300 (السعر والتغليف)"],answer:0,
hint:"رقم الأعمال = ما جُمع من البيع فقط، لا علاقة له بالتكاليف.",
explanation:"CA = 800 × 25 = 20,000 دج. رقم الأعمال يعتمد على السعر والكمية فقط. التكاليف تُستخدم لحساب الربح لاحقاً."},

{id:6,level:1,domain:"حياة يومية",
situation:"تريدين معرفة نسبة ما تكسبينه من كل دينار تبيعينه. كل فطيرة تبيعينها بـ 70 دج وهامش كل فطيرة 25 دج. بعتِ هذا الأسبوع 40 فطيرة.",
info:"📌 معدل الهامش (t) = هامش الوحدة ÷ سعر البيع\n→ يخبرك كم دج يبقى لكِ من كل 100 دج مبيعات",
question:"لحساب النسبة من كل دينار، أي كميتين تستعملين؟",
type:"mcq",options:["25 و 70 (الهامش والسعر)","25 و 40 (الهامش والكمية)","70 و 40 (السعر والكمية)","25 و 70 و 40 (الثلاثة معاً)"],answer:0,

type:"mcq",options:["التحيّز: الهدايا تجعل الإجابات غير موثوقة","حجم العينة صغير فقط","المدينة الواحدة فقط","الدراسة كاذبة تماماً"],answer:0,
hint:"حتى لو كانت العينة كبيرة — هل الهدايا تؤثر على الإجابات؟",
explanation:"التحيّز هو الأخطر لأنه يُفسد النتائج حتى مع عينة كبيرة. إذا أجبت الأطباء بسبب الهدية لا بسبب قناعتهم، فالنتيجة لا قيمة لها بغض النظر عن الحجم."},

{id:70,level:3,domain:"منطق",
situation:"إحصاء: 'معدل دخل سكان حي راقٍ = 85,000 دج/شهر'. عندما فحصتِ البيانات وجدتِ: 95 شخصاً يكسبون 20,000 دج، و5 أشخاص يكسبون 1,300,000 دج.",
info:"📌 المتوسط الحسابي:\nالمجموع = (95×20,000)+(5×1,300,000) = 8,400,000\nالمتوسط = 8,400,000÷100 = 84,000 ≈ 85,000 ✓\nلكن 95% من السكان يكسبون 20,000 فقط!",
question:"ما المشكلة في استخدام المتوسط هنا؟",
type:"mcq",options:["القيم الشاذة الـ5 تشوّه المتوسط ويُضلّل عن الواقع","المتوسط خاطئ رياضياً","يجب استخدام النسبة المئوية","العينة صغيرة جداً"],answer:0,
hint:"ما الرقم الذي يمثل الشخص العادي في هذا الحي؟",
explanation:"المتوسط 85,000 صحيح رياضياً لكنه مضلِّل. الوسيط = 20,000 دج (يمثل 95% من السكان). 5 أثرياء رفعوا المتوسط 4 أضعاف. لهذا يستخدم الاقتصاديون الوسيط لقياس دخل 'الشخص العادي'."},

{id:71,level:3,domain:"اقتصاد",
situation:"محل أحذية: سعر الحذاء 2,400 دج، cv=900 دج، CF=90,000 دج/شهر.\nرقم الأعمال هذا الشهر = 192,000 دج.\nصاحبة المحل قالت: 'ربحي = 192,000 − 90,000 = 102,000 دج'. هل هي محقة؟",
info:"📌 الربح الحقيقي:\nQ = CA÷P (لاستخراج الكمية)\nR = (P−cv)×Q − CF\nأو: R = CA − (CF + cv×Q)",
question:"ما الخطأ وما الخطوة الأولى لإصلاحه؟",
type:"mcq",options:["نسيت CV → نستخرج Q أولاً: Q = 192,000÷2,400 = 80 حذاء","الحساب صحيح تماماً","تطرح cv من السعر فقط","تضرب CF في عدد الأحذية"],answer:0,
hint:"هل طُرحت تكاليف المواد (cv × الكمية)؟",
explanation:"Q=80. CV=900×80=72,000. R=192,000−90,000−72,000=30,000 دج. وليس 102,000! صاحبة المحل نسيت تكلفة شراء الأحذية نفسها."},

{id:72,level:3,domain:"اقتصاد",
situation:"خياطة تبيع فستاناً بـ 3,000 دج. منافسة جديدة أجبرتها على تخفيض السعر 20%.\nتكلفة المواد لكل فستان 1,200 دج. CF = 36,000 دج/شهر.\nكيف تغيرت عتبة المردودية؟",
info:"📌 SR_قديم = CF÷(P_قديم−cv)\nSR_جديد = CF÷(P_جديد−cv)\nP_جديد = P_قديم×(1−0.20)",
question:"ما الخطوة الأولى لحساب SR الجديد؟",
type:"mcq",options:["P_جديد = 3000×0.80 = 2,400 دج","SR_جديد = SR_قديم×1.20","م_جديد = 3000×0.80−1200","CF÷0.20 مباشرة"],answer:0,
hint:"أولاً: ما هو السعر الجديد؟",
explanation:"P_جديد=2,400. م_جديد=1,200 (بدل 1,800). SR_قديم=36,000÷1,800=20 فستان. SR_جديد=36,000÷1,200=30 فستان. تخفيض 20% في السعر رفع عتبة المردودية 50%!"},

{id:73,level:3,domain:"فيزياء",
situation:"لوح شمسي 400 واط على سطح منزل. يعمل فعلياً 5 ساعات/يوم. تكلفة التركيب 72,000 دج. الفاتورة الكهربائية قبله 2,400 دج/شهر. سعر kWh من الشبكة = 8 دج.",
info:"📌 لحساب فترة الاسترداد:\n1) الطاقة الشهرية = P(kW) × ساعات × 30\n2) التوفير الشهري = الطاقة × سعر kWh\n3) فترة الاسترداد = تكلفة التركيب ÷ التوفير الشهري",
question:"ما الخطوة غير المباشرة التي يجب اكتشافها أولاً؟",
type:"mcq",options:["الطاقة الشهرية = 0.4×5×30 = 60 kWh، ثم التوفير = 60×8 = 480 دج/شهر","فترة الاسترداد = 72,000÷2,400 = 30 شهراً مباشرة","التوفير = الفاتورة القديمة كاملة = 2,400 دج/شهر","التكلفة ÷ القدرة = 72,000÷400"],answer:0,
hint:"اللوح لا يلغي الفاتورة كاملاً — يلغي فقط ما ينتجه فعلياً.",
explanation:"التوفير الفعلي = 480 دج/شهر (ليس 2,400). فترة الاسترداد = 72,000÷480 = 150 شهر = 12.5 سنة. لكن عمر اللوح 25 سنة → التوفير الإجمالي = 480×300=144,000 دج > 72,000 → مجدٍ."},

{id:74,level:3,domain:"فيزياء",
situation:"قطار يسير بـ 72 كم/سا يصطدم بعائق. قوة الاصطدام = m×a. كتلة القطار 50,000 كغ. تباطأ من 72 كم/سا إلى الصفر في 3 ثواني.",

question:"ما الخطوة الأولى غير الواضحة هنا؟",

hint:"72 كم/سا لا تدخل في F=ma مباشرة. يجب التحويل أولاً.",
explanation:"v=20 م/ث. a=20÷3=6.67 م/ث². F=50,000×6.67=333,500 N. هذه القوة الضخمة تفسر لماذا الاصطدامات بالسرعات العالية مدمّرة جداً."},

{id:75,level:3,domain:"كيمياء",
situation:"عندك 100 مل من محلول HCl تركيزه 0.5 mol/L و150 مل من محلول NaOH تركيزه 0.3 mol/L.\nخلطتِ المحلولين. ما طبيعة الخليط النهائي (حمضي/قاعدي/متعادل)؟",
info:"📌 المسار:\n1) n(HCl) = 0.5×0.1 = 0.05 مول\n2) n(NaOH) = 0.3×0.15 = 0.045 مول\n3) HCl + NaOH → NaCl + H₂O (نسبة 1:1)\n4) المادة الفائضة تحدد طبيعة الخليط",
question:"ما الخطوة الأولى الضرورية؟",
type:"mcq",options:["n(HCl) = 0.5×0.1 = 0.05 مول وn(NaOH) = 0.3×0.15 = 0.045 مول","مقارنة التركيزين: 0.5 > 0.3 → حمضي","مقارنة الحجمين: 150 > 100 → قاعدي","جمع التركيزين = 0.8 mol/L"],answer:0,
hint:"لا نقارن التركيزات ولا الأحجام — نقارن المولات.",
explanation:"n(HCl)=0.05 > n(NaOH)=0.045 → HCl فائضة بـ 0.005 مول → الخليط حمضي. خطأ شائع: مقارنة التركيزات مباشرة دون حساب المولات."},

{id:76,level:3,domain:"كيمياء",
situation:"تفاعل الاحتراق: C₃H₈ + 5O₂ → 3CO₂ + 4H₂O\nعندك 44 غ من البروبان C₃H₈ (M=44 غ/مول) و128 غ من O₂ (M=32 غ/مول).\nكم غ من CO₂ (M=44) تنتجين؟",
info:"📌 المسار:\n1) n(C₃H₈) = 44÷44 = 1 مول\n2) n(O₂) = 128÷32 = 4 مول\n3) 1 مول C₃H₈ يحتاج 5 مول O₂ → O₂ غير كافية!\n4) 4 مول O₂ تتفاعل مع 4÷5=0.8 مول C₃H₈\n5) n(CO₂) = 0.8×3 = 2.4 مول",
question:"ما المادة المحدِّدة وكم غ CO₂ تنتج؟",
type:"mcq",options:["O₂ محدِّدة → CO₂ = 2.4×44 = 105.6 غ","C₃H₈ محدِّدة → CO₂ = 3×44 = 132 غ","كلاهما متساويان","CO₂ = 44+128 = 172 غ"],answer:0,
hint:"1 مول C₃H₈ يحتاج 5 مول O₂. عندنا 4 فقط → O₂ تنتهي أولاً.",
explanation:"O₂ محدِّدة. 4 مول O₂ → 4÷5=0.8 مول C₃H₈ → 0.8×3=2.4 مول CO₂ → 105.6 غ."},

{id:77,level:3,domain:"رياضيات",
situation:"ثلاثة صواريخ تتسابق:\n• صاروخ A: سرعة 1,000 م/ث، يبدأ من نقطة الانطلاق\n• صاروخ B: سرعة 800 م/ث، له تقدم 500 م\n• صاروخ C: سرعة 1,200 م/ث، يبدأ متأخراً 2 ثانية\nمن يصل أولاً لخط النهاية عند 5,000 م؟",
info:"📌 الزمن = المسافة ÷ السرعة\nA: t = 5000÷1000 = 5 ث\nB: مسافته = 5000−500 = 4500 م → t = 4500÷800 = 5.625 ث\nC: t = 5000÷1200 + 2 = 4.17+2 = 6.17 ث",
question:"أيها يصل أولاً؟",
type:"mcq",options:["A يصل أولاً في 5 ثواني","B رغم سرعته الأقل يصل أولاً (5.625 ث)","C الأسرع يصل أولاً","B وA يصلان معاً"],answer:0,
hint:"احسبي الزمن الفعلي لكل صاروخ، مع الأخذ بعين الاعتبار المسبقية والتأخير.",
explanation:"A=5 ث. B=5.625 ث. C=6.17 ث. A يفوز! التقدم لم يكفِ لـ B، والتأخير أضرّ C رغم سرعته الأعلى."},

{id:78,level:3,domain:"رياضيات",
situation:"في صندوق 5 كرات حمراء و3 زرقاء و2 خضراء.\nسحبتِ كرة واحدة دون نظر. ما احتمال أن تكون غير خضراء؟",
info:"📌 الاحتمال التكميلي:\nP(غير خضراء) = 1 − P(خضراء)\nP(خضراء) = 2÷10 = 0.2\nإذن P(غير خضراء) = 0.8 = 80%\nأسرع من حساب P(حمراء)+P(زرقاء)",
question:"ما أذكى طريقة للحساب؟",
type:"mcq",options:["1 − P(خضراء) = 1−2/10 = 80%","P(حمراء)+P(زرقاء) = 5/10+3/10 = 80%","(5+3)÷10 = 80% (نفس النتيجة أيضاً)","كل الطرق السابقة صحيحة وتعطي نفس الجواب"],answer:3,
hint:"كلها صحيحة — لكن أيها أذكى وأسرع؟",
explanation:"كلها تعطي 80%. لكن الطريقة التكميلية (1−P(خضراء)) أسرع عندما نحسب 'ما عدا شيء واحد'. ستطبّقينها كثيراً في الاحتمالات."},

{id:79,level:3,domain:"منطق",
situation:"دواء جديد اختُبر على 1,000 مريض:\n• المجموعة أ (500 شخص أخذوا الدواء): 400 شفوا\n• المجموعة ب (500 شخص أخذوا وهماً): 350 شفوا\nالشركة تعلن: 'الدواء فعّال بنسبة 80%!'",

question:"ما الفعالية الحقيقية للدواء؟",
type:"mcq",options:["80%−70% = 10% (الفرق بين المجموعتين)","80% (نسبة الشفاء في مجموعة الدواء)","(80%+70%)÷2 = 75%","80%÷70% = 114%"],answer:0,

{id:80,level:3,domain:"منطق",

{id:83,level:3,domain:"فيزياء",

{id:85,level:3,domain:"كيمياء",
situation:"تحليل مياه شرب:\n• تركيز Ca²⁺ = 150 mg/L (الحد الأقصى 200 mg/L) ✓\n• تركيز Pb²⁺ = 0.02 mg/L (الحد الأقصى = 0.01 mg/L) ✗\n• pH = 7.8 (المقبول 6.5−8.5) ✓\n• تركيز NO₃⁻ = 45 mg/L (الحد الأقصى 50 mg/L) ✓\nهل المياه آمنة للشرب؟",
info:"📌 المياه غير آمنة إذا تجاوز أي معيار حدّه\nالرصاص Pb²⁺ يتجاوز الحد الأقصى ضعفين",

{id:86,level:3,domain:"كيمياء",

{id:87,level:3,domain:"رياضيات",
situation:"شركة نمت:\n• السنة 1: من 100 موظف إلى 150 (+50%)\n• السنة 2: من 150 إلى 120 (−20%)\nالمدير يقول: 'النمو الإجمالي = 50%−20% = 30%'.\nهل هو محق؟",
info:"📌 النمو المركّب:\nالإجمالي = (1+0.50)×(1−0.20) − 1 = 1.50×0.80 − 1 = 0.20 = 20%\nأو: 100 → 150 → 120. النمو = (120−100)÷100×100 = 20%",
question:"ما النمو الإجمالي الصحيح؟",
type:"mcq",options:["20% (من 100 إلى 120)، لا 30%","30% كما قال المدير","−20% (الشركة تراجعت)","50% (النمو الأكبر يسود"],answer:0,
hint:"احسبي العدد النهائي: 100 → 150 → 120. نسبة التغير من البداية؟",
explanation:"من 100 إلى 120 = نمو 20%. المدير خطأ لأن النسب المتتالية تُضرب لا تُجمع: 1.5×0.8=1.2 → نمو 20%. درس مهم: +50% ثم −20% ≠ +30%."},

{id:88,level:3,domain:"رياضيات",
situation:"مسابقة احتمالات:\nرميتِ حجر نرد مرتين. ما احتمال الحصول على مجموع = 8؟\n(المجموع الكلي للأزواج = 36)",
info:"📌 أزواج تعطي مجموع 8:\n(2,6)(3,5)(4,4)(5,3)(6,2) = 5 أزواج\nP(مجموع=8) = 5÷36",
question:"ما الاحتمال؟",
type:"mcq",options:["5÷36 ≈ 13.9%","8÷36 ≈ 22.2%","5÷12 ≈ 41.7%","1÷6 ≈ 16.7%"],answer:0,
hint:"عددي الأزواج التي مجموعها 8 بشكل منهجي.",
explanation:"(2,6)(3,5)(4,4)(5,3)(6,2) = 5 أزواج. P=5÷36≈13.9%. المجموع 7 هو الأكثر احتمالاً (6 أزواج). المجموع 2 والمجموع 12 هما الأقل (زوج واحد لكل منهما)."},

{id:89,level:3,domain:"منطق",
situation:"إعلان تأمين: 'ادفع 500 دج/شهر وستحصل على 100,000 دج إذا أصابك مرض خطير. احتمال إصابتك = 2% سنوياً.'",
info:"📌 القيمة المتوقعة لكل شخص:\nتكلفة التأمين السنوية = 500×12 = 6,000 دج\nالعائد المتوقع = 0.02×100,000 = 2,000 دج\nشركة التأمين تكسب = 6,000−2,000 = 4,000 دج/شخص",
question:"هل التأمين يستحق رياضياً؟ وما الذي يجعله مقبولاً رغم ذلك؟",
type:"mcq",options:["رياضياً لا يستحق (تخسرين 4,000/سنة في المتوسط) لكنه يحمي من كارثة مالية","رياضياً يستحق لأن 100,000 > 6,000","لا يستحق أبداً في أي حال","يستحق فقط إذا كان احتمال المرض أعلى من 6%"],answer:0,
hint:"القيمة المتوقعة سلبية، لكن التأمين يحمي من الكارثة التي لا تستطيعين تحمّلها.",
explanation:"رياضياً: تخسرين 4,000 دج/سنة في المتوسط. لكن التأمين يحولك من خطر كارثي (100,000 دج دفعة واحدة) إلى تكلفة محمولة (500/شهر). هذه هي قيمة التأمين: ليس الربح، بل الحماية من الكارثة."},

{id:90,level:3,domain:"منطق",

{id:97,level:4,domain:"فيزياء",

explanation:"QM=25+10=35 دج. ثمن التذكرة 100 دج > 35 دج. خسارة متوقعة 65 دج لكل تذكرة. المنظِّم يكسب 65 دج في المتوسط من كل مشترك."},

{id:116,level:4,domain:"منطق",
situation:"مصنعان يُنتجان نفس المنتج:\n• مصنع A: 10,000 وحدة/يوم، عيب في 0.5%\n• مصنع B: 6,000 وحدة/يوم، عيب في 1.2%",
question:"كم وحدة معيبة تنتج المصنعان معاً يومياً؟",
type:"number",answer:122,unit:"وحدة",
hint:"معيبات A = 10,000×0.005. معيبات B = 6,000×0.012.",
explanation:"A: 50 وحدة. B: 72 وحدة. الإجمالي=122 وحدة. رغم معدل عيب A أقل، إنتاجه الأكبر يعني عيوباً أكثر بالعدد المطلق!"},

{id:117,level:4,domain:"منطق",
situation:"سيارتان تتعقبان لصاً:\n• سيارة الشرطة: تبدأ من نقطة A بسرعة 120 كم/سا\n• سيارة اللص: تبدأ من نفس النقطة قبل 10 دقائق بسرعة 90 كم/سا",
question:"بعد كم دقيقة تلحق سيارة الشرطة باللص؟",
type:"number",answer:30,unit:"دقيقة",
hint:"تقدم اللص = 90×(10/60) = 15 كم. الشرطة تكسب 30 كم/سا. الوقت = 15÷30 ساعة.",
explanation:"تقدم اللص=15 كم. الشرطة تسبق بـ30 كم/سا. وقت اللحاق=15÷30=0.5 ساعة=30 دقيقة."},

{id:118,level:4,domain:"منطق",
situation:"شركة تُعلن: 'خسائرنا انخفضت 80%!' السنة الماضية خسرت 50,000 دج. هذه السنة خسرت 10,000 دج.",
question:"هل الإعلان صحيح رياضياً؟ احسب نسبة الانخفاض الفعلية.",
type:"number",answer:80,unit:"%",
hint:"نسبة الانخفاض = (50,000−10,000)÷50,000×100",
explanation:"(40,000÷50,000)×100=80%. الإعلان صحيح رياضياً. لكن انتبهي: الشركة لا تزال تخسر! 'تحسّن الأداء' لا يعني 'ربح'. قراءة الأرقام بعقل ناقد ضرورية."},

{id:119,level:4,domain:"منطق",
situation:"بيانات مبيعات متجر في 5 أشهر:\n50, 80, 45, 90, 85 وحدة.\nالمدير يريد 'الرقم الأكثر تمثيلاً للأداء'.",
question:"احسب المتوسط والوسيط. أيهما أكثر تمثيلاً هنا؟",
type:"number",answer:80,unit:"(الوسيط)",
hint:"المتوسط=(50+80+45+90+85)÷5. الوسيط=القيمة الوسطى بعد الترتيب.",
explanation:"المتوسط=350÷5=70. الوسيط (بعد الترتيب: 45,50,80,85,90)=80. الوسيط أكثر تمثيلاً لأن 4 من 5 أشهر ≥ 80. المتوسط تأثّر بالشهر الضعيف (45)."},

{id:120,level:4,domain:"منطق",
situation:"تريدين السفر مسافة 300 كم. خيارات:\n• سيارة: 7 ل/100كم × 60 دج/ل + 1 ساعة\n• قطار: تذكرة 900 دج + 2 ساعة\n• طائرة: تذكرة 3,500 دج + 1.5 ساعة (مع التنقل للمطار)\nإذا قيّمتِ الساعة بـ 500 دج:",
question:"ما التكلفة الإجمالية (مال+وقت) للقطار (دج)؟",
type:"number",answer:1900,unit:"دج",
hint:"تكلفة القطار = 900 + (2×500).",
explanation:"قطار: 900+1,000=1,900 دج. سيارة: (7×3×60)+500=1,260+500=1,760 دج. طائرة: 3,500+750=4,250 دج. السيارة أرخص إجمالاً! القطار ثانياً."},

{id:121,level:5,domain:"اقتصاد",
situation:"مشروع إنتاج زيت زيتون:\n• سعر البيع: 800 دج/لتر\n• تكلفة الإنتاج المتغيرة: 350 دج/لتر\n• التكاليف الثابتة الشهرية: 135,000 دج\n• الطاقة الإنتاجية القصوى: 500 لتر/شهر\n• الإنتاج الحالي: 350 لتر/شهر\n\nسوبرماركة عرضت شراء 100 لتر إضافية بسعر مخفَّض 550 دج/لتر فقط.\n\nالمطلوب:\n1) احسب نتيجة الاستغلال الحالية\n2) هل تقبلين عرض السوبرماركة؟ ولماذا؟\n3) ما نتيجة الاستغلال إذا قبلتِ؟",
question:"ما نتيجة الاستغلال الحالية (دج)؟",
type:"number",answer:22500,unit:"دج",
hint:"R = م×Q − CF. م = 800−350.",
explanation:"م=450. R=450×350−135,000=157,500−135,000=22,500 دج. للعرض: السعر (550) > cv (350) → هامش=200×100=20,000 دج إضافي. R_جديد=22,500+20,000=42,500 دج. نعم، قبولي العرض يضاعف الربح تقريباً!"},

{id:122,level:5,domain:"اقتصاد",
situation:"خياطة تبيع منتجين:\n• فستان سهرة: P=4,500 دج، cv=1,800 دج، تبيع 20/شهر\n• فستان يومي: P=1,500 دج، cv=600 دج، تبيع 60/شهر\n• CF=75,000 دج/شهر\n\nمورد عرض خامات أفضل جودة ستزيد cv الفستان اليومي بـ 200 دج لكن سيسمح برفع سعره 300 دج.\n\n1) ما نتيجة الاستغلال الحالية؟\n2) هل يستحق تبني عرض المورد؟",
question:"ما نتيجة الاستغلال الحالية (دج)؟",
type:"number",answer:9000,unit:"دج",
hint:"R = (م_سهرة×20 + م_يومي×60) − CF.",
explanation:"م_سهرة=2,700. م_يومي=900. R=(2,700×20+900×60)−75,000=(54,000+54,000)−75,000=33,000 دج. للعرض: م_يومي_جديد=900+100=1,000. R_جديد=(54,000+60,000)−75,000=39,000 دج. نعم، يستحق! +6,000 دج/شهر."},

{id:123,level:5,domain:"اقتصاد",
situation:"مقهى يدرس إضافة خدمة توصيل:\n• تكلفة التوصيل الإضافية: 15,000 دج/شهر (سائق + وقود)\n• يتوقع جذب 200 طلبية توصيل/شهر\n• متوسط قيمة الطلبية: 350 دج\n• هامش المقهى على المبيعات: 60%\n\n1) ما الهامش المتوقع من التوصيل؟\n2) هل يغطي تكلفة التوصيل الإضافية؟\n3) ما الحد الأدنى من الطلبيات للتعادل؟",
question:"ما الهامش الإجمالي المتوقع من 200 طلبية (دج)؟",
type:"number",answer:42000,unit:"دج",
hint:"الهامش الإجمالي = 200 × 350 × 60%.",
explanation:"الهامش=200×350×0.60=42,000 دج > 15,000 (تكلفة التوصيل). نعم، يستحق! الربح الإضافي=27,000 دج/شهر. للتعادل: طلبيات_min=15,000÷(350×0.60)=71.4 → 72 طلبية كافية."},

{id:124,level:5,domain:"فيزياء",
situation:"مركبة فضائية تتسارع في الفضاء:\n• الكتلة الكلية (مركبة + وقود): 50,000 كغ\n• قوة المحركات: 500,000 N\n• معدل استهلاك الوقود: 100 كغ/ثانية\n• مدة الاحتراق: 200 ثانية\n\n1) ما التسارع الابتدائي (في بداية الاحتراق)؟\n2) ما الكتلة في نهاية الاحتراق؟\n3) ما التسارع في نهاية الاحتراق (بفرض القوة ثابتة)؟",
question:"ما التسارع الابتدائي (م/ث²)؟",
type:"number",answer:10,unit:"م/ث²",
hint:"a = F ÷ m_ابتدائية",
explanation:"a_ابتدائي=500,000÷50,000=10 م/ث². الكتلة النهائية=50,000−(100×200)=30,000 كغ. a_نهائي=500,000÷30,000=16.7 م/ث². هذا يفسر لماذا الصاروخ يتسارع بشكل متزايد كلما احترق وقوده!"},

{id:125,level:5,domain:"فيزياء",
situation:"شبكة طاقة شمسية لقرية:\n• عدد الألواح: 50 لوح × 300 واط\n• ساعات عمل فعلية: 6 ساعات/يوم\n• مردود النظام الكلي: 85%\n• احتياج القرية: 70 kWh/يوم\n\n1) ما الطاقة المنتجة فعلياً يومياً؟\n2) هل تكفي لاحتياج القرية؟\n3) ما عدد الألواح الإضافية اللازمة إذا لم تكفِ؟",
question:"ما الطاقة المنتجة فعلياً يومياً (kWh)؟",
type:"number",answer:76.5,unit:"kWh",
hint:"الطاقة = (50×0.3 kW) × 6 ساعات × 0.85.",
explanation:"الطاقة=50×0.3×6×0.85=76.5 kWh > 70 kWh. تكفي! الفائض=6.5 kWh/يوم. ممتاز: النظام يغطي الاحتياج مع احتياطي للأيام الغائمة."},

{id:126,level:5,domain:"فيزياء",
situation:"منزل يريد تقليل فاتورة الكهرباء:\n• تغيير كل المصابيح: 20 مصباح × (60W→10W LED)\n• تكلفة كل مصباح LED: 250 دج\n• ساعات استخدام: 8 ساعات/يوم\n• سعر kWh: 8 دج\n\n1) التوفير اليومي في kWh\n2) التوفير المالي الشهري\n3) خلال كم شهر يُسترد استثمار الـLED؟",
question:"ما التوفير المالي الشهري (دج)؟",
type:"number",answer:384,unit:"دج",
hint:"فرق القدرة = 20×(60−10)=1,000W. التوفير/يوم = 1 kWh × 8 دج. × 30 يوم.",
explanation:"التوفير/يوم=1 kWh×8=8 دج. التوفير/شهر=8×30=240 دج... انتظري: 20 مصباح×50W=1,000W=1 kWh/ساعة×8=8 kWh/يوم×8 دج=64 دج/يوم×30=1,920 دج/شهر. تكلفة LED=20×250=5,000 دج. الاسترداد=5,000÷1,920≈2.6 شهر."},

{id:127,level:5,domain:"كيمياء",
situation:"مختبر يحضّر دواء:\n• التفاعل: A + 2B → C (الدواء المطلوب)\n• M(A)=120 غ/مول، M(B)=36 غ/مول، M(C)=192 غ/مول\n• البداية: 360 غ من A و360 غ من B\n• سعر A: 500 دج/غ. سعر B: 200 دج/غ\n• سعر الدواء C: 2,000 دج/غ\n\n1) ما المادة المحدِّدة؟\n2) كم غ من C تنتج؟\n3) ما الربح من بيع C مقارنة بتكلفة المواد الخام؟",
question:"كم غراماً من الدواء (C) تنتجين؟",
type:"number",answer:384,unit:"غ",
hint:"n(A)=360÷120=3 مول. n(B)=360÷36=10 مول. 3 مول A تحتاج 6 مول B. عندنا 10 → A محدِّدة. n(C)=n(A)=3 مول.",
explanation:"A محدِّدة. n(C)=3 مول. m(C)=3×192=576 غ... انتظري: A+2B→C يعني 1 مول A ينتج 1 مول C. n(C)=3 مول. m=3×192=576 غ. تكلفة=(360×500)+(360×200)=252,000 دج. إيرادات=576×2,000=1,152,000 دج. ربح=900,000 دج!"},

{id:128,level:5,domain:"كيمياء",
situation:"تنظيف صناعي بالكلور:\n• محلول أصلي: Cl₂ تركيزه 5% (w/v) في 10 لتر\n• يُخفَّف إلى 0.1% للاستخدام\n• تفاعل الكلور مع الجراثيم: Cl₂ + H₂O → HCl + HClO\n• HClO هو العامل المطهِّر الفعّال\n• M(Cl₂)=71 غ/مول، M(HClO)=52.5 غ/مول\n\n1) ما حجم المحلول المخفَّف الذي يمكن تحضيره؟\n2) كم غ Cl₂ في 10 لتر من المحلول الأصلي؟\n3) كم مول HClO يمكن إنتاجه نظرياً؟",
question:"ما حجم المحلول المخفَّف (0.1%) الذي يمكن تحضيره من 10 لتر أصلية (لتر)؟",
type:"number",answer:500,unit:"لتر",
hint:"C₁V₁=C₂V₂ → 5×10=0.1×V₂.",
explanation:"V₂=5×10÷0.1=500 لتر. كتلة Cl₂=(5÷100)×10,000 مل=500 غ. n(Cl₂)=500÷71=7.04 مول → n(HClO)=7.04 مول=7.04×52.5=369.5 غ HClO."},

{id:129,level:5,domain:"كيمياء",
situation:"تحليل تغذية:\nوجبة تحتوي:\n• 30 غ بروتين (4 سعر/غ)\n• 50 غ كربوهيدرات (4 سعر/غ)\n• 20 غ دهون (9 سعر/غ)\n• 5 غ ألياف (2 سعر/غ)\n\nشخص يحتاج 2,000 سعر/يوم. يأكل هذه الوجبة 3 مرات/يوم.\n\n1) كم سعراً في الوجبة الواحدة؟\n2) هل 3 وجبات تكفي الاحتياج اليومي؟\n3) ما نسبة الدهون من إجمالي السعرات؟",
question:"كم سعراً حرارياً في الوجبة الواحدة؟",
type:"number",answer:590,unit:"سعر حراري",
hint:"السعرات = (30×4)+(50×4)+(20×9)+(5×2).",
explanation:"سعرات=120+200+180+10=510... انتظري: 30×4=120، 50×4=200، 20×9=180، 5×2=10. الإجمالي=510 سعر. 3 وجبات=1,530 < 2,000 → غير كافية (يحتاج وجبات خفيفة). الدهون=180÷510×100=35.3%."},

{id:130,level:5,domain:"رياضيات",
situation:"شركة ناشئة تدرس توسّعها:\n• الإيرادات الحالية: 200,000 دج/شهر\n• معدل النمو المتوقع: 15%/شهر (مركّب)\n• التكاليف الثابتة: 50,000 دج/شهر تنمو 5%/شهر\n• التكاليف المتغيرة: 60% من الإيرادات\n\nبعد 6 أشهر: (1.15)⁶≈2.313، (1.05)⁶≈1.340\n\n1) ما الإيرادات بعد 6 أشهر؟\n2) ما التكاليف الثابتة بعد 6 أشهر؟\n3) ما الربح بعد 6 أشهر؟",
question:"ما الإيرادات المتوقعة بعد 6 أشهر (دج)؟",
type:"number",answer:462600,unit:"دج",
hint:"الإيرادات = 200,000 × (1.15)⁶",
explanation:"الإيرادات=200,000×2.313=462,600 دج. CF=50,000×1.340=67,000 دج. CV=462,600×0.60=277,560 دج. الربح=462,600−67,000−277,560=118,040 دج. مقارنة بالشهر الأول: الربح=200,000×0.40−50,000=30,000 دج. الربح تضاعف تقريباً 4 مرات!"},

{id:131,level:5,domain:"رياضيات",
situation:"مسألة التقاعد:\nموظفة تبدأ التخطيط الآن عمرها 30 سنة. تريد امتلاك أصل (عقار/مشروع) بقيمة 5,000,000 دج عند التقاعد في سن 60.\n• الخيار A: تستثمر مبلغاً واحداً الآن في مشروع تجاري ينمو رأسماله بمعدل 8%/سنة (نمو حقيقي من نشاط تجاري)\n• الخيار B: تدّخر مبلغاً ثابتاً كل شهر بدون أي نمو\n\n(1.08)³⁰≈10.06\n\n1) كم تستثمر الآن في الخيار A؟\n2) إذا أرادت في الخيار B ادخاراً شهرياً بسيطاً: كم في الشهر؟",
question:"كم دجاً تستثمر الآن في الخيار A لتحقيق 5,000,000 دج بعد 30 سنة؟",
type:"number",answer:497017,unit:"دج",
hint:"C₃₀ = C₀×(1.08)³⁰ = 5,000,000 → C₀ = 5,000,000÷10.06",
explanation:"C₀=5,000,000÷10.06≈497,017 دج. الخيار B (بدون نمو): 5,000,000÷(30×12)=13,889 دج/شهر. الرسالة: الاستثمار المبكر في نشاط حقيقي ينمو بشكل مركّب يحتاج 497 ألف فقط، بينما الادخار الثابت بدون نمو يحتاج 5 ملايين كاملة إجمالاً!"},

{id:132,level:5,domain:"رياضيات",
situation:"مسابقة رياضية: دوري 8 فرق (كل فريق يلاقي الآخر مرة واحدة).\nنقاط: فوز=3، تعادل=1، خسارة=0.\n\n1) كم مباراة إجمالاً في الدوري؟\n2) كم نقطة يمكن توزيعها إجمالاً؟ (حالة الفوز الكامل + حالة التعادل الكامل)\n3) إذا انتهت جميع المباريات بفوز (لا تعادل): كم نقطة يحصل الفائز الأول إذا فاز بكل مبارياته؟",
question:"كم مباراة إجمالاً في دوري 8 فرق؟",
type:"number",answer:28,unit:"مباراة",
hint:"عدد المباريات = C(8,2) = 8×7÷2.",
explanation:"28 مباراة. النقاط عند الفوز الكامل: 28×3=84 نقطة. عند التعادل الكامل: 28×2=56 نقطة. الفائز الذي يفوز بكل مبارياته: 7 مباريات×3=21 نقطة."},

{id:133,level:5,domain:"منطق",
situation:"شركة أدوية تختبر دواء جديد لضغط الدم:\n• المجموعة أ (600 مريض أخذوا الدواء): الضغط انخفض عند 480 (80%)\n• المجموعة ب (600 مريض أخذوا وهماً): الضغط انخفض عند 360 (60%)\n• التكلفة: 2,000 دج/مريض/شهر\n• دواء بديل: فعالية 65%، تكلفة 800 دج/شهر\n\n1) ما الفعالية الحقيقية للدواء الجديد (فوق الوهم)؟\n2) هل يستحق سعره مقارنة بالبديل؟",
question:"ما الفعالية الحقيقية للدواء الجديد (%)؟",
type:"number",answer:20,unit:"%",
hint:"الفعالية = P(مع دواء) − P(مع وهم) = 80%−60%.",
explanation:"الفعالية=20% فوق الوهم. البديل فعاليته الإضافية=65%−60%(افتراضي)=5%. الدواء الجديد أفضل فعلياً (20% > 5%). لكن هل 2,000÷800=2.5 ضعف السعر يستحق 4 أضعاف الفعالية؟ قرار طبي واقتصادي معاً."},

{id:134,level:5,domain:"منطق",
situation:"مدينتان تتنافسان لاستضافة فعالية رياضية:\n• المدينة A: تكلفة البناء 2 مليار دج، عائد سياحي متوقع 500 مليون/سنة\n• المدينة B: تكلفة البناء 800 مليون دج، عائد سياحي 180 مليون/سنة\n• عمر المنشآت: 20 سنة\n\n1) ما إجمالي العائد لكل مدينة؟\n2) ما صافي الربح لكل مدينة؟\n3) أيهما أفضل استثماراً؟",
question:"ما صافي الربح لمدينة A خلال 20 سنة (مليون دج)؟",
type:"number",answer:8000,unit:"مليون دج",
hint:"صافي الربح = العائد الإجمالي − تكلفة البناء.",
explanation:"A: 500×20=10,000−2,000=8,000 مليون. B: 180×20=3,600−800=2,800 مليون. A أفضل بصافي ربح أعلى. لكن: A تحتاج استثماراً أولياً أكبر (ريسك أعلى). ROI: A=8000÷2000=4 ضعف، B=2800÷800=3.5 ضعف. A أفضل من كل الجوانب!"},

{id:135,level:5,domain:"منطق",

// ══════════════════════════════════════════════
//  STATE & STORAGE
// ══════════════════════════════════════════════
const SKEY = 'mantiqiV3';
let S = {
  theme:'light', results:{}, weaknesses:{}, streak:0,
  currentLevel:null, queue:[], qIdx:0, seenIds:new Set(),
  previewMode: false
};

function load(){
  try{
    const r=localStorage.getItem(SKEY);
    if(r){const d=JSON.parse(r);S.results=d.results||{};S.weaknesses=d.weaknesses||{};S.streak=d.streak||0;S.theme=d.theme||'light';}
  }catch(e){}
}
function save(){
  try{localStorage.setItem(SKEY,JSON.stringify({results:S.results,weaknesses:S.weaknesses,streak:S.streak,theme:S.theme}));}catch(e){}
}

function cat(ex){
  return ex.level===1?`${ex.domain}:${ex.answer}`:ex.domain;
}
function acc(c){
  const w=S.weaknesses[c];
  return(!w||w.a===0)?0.5:w.c/w.a;
}
function recordWeakness(ex,correct){
  const c=cat(ex);
  if(!S.weaknesses[c])S.weaknesses[c]={a:0,c:0};
  S.weaknesses[c].a++;
  if(correct)S.weaknesses[c].c++;
}

// ══════════════════════════════════════════════
//  QUEUE (ADAPTIVE)
// ══════════════════════════════════════════════
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function buildQueue(lv){
  const lvExs=DB.filter(e=>e.level===lv);
  // المستوى 1: ترتيب ثابت لأن التدرج في الصعوبة مقصود
  const base = lv===1 ? lvExs.map(e=>e.id) : shuffle(lvExs.map(e=>e.id));
  const extras=[];
  if(lv!==1){
    lvExs.forEach(e=>{
      if(acc(cat(e))<0.6)extras.push(e.id);
    });
  }
  return [...base,...shuffle(extras).slice(0,8)];
}

function findSimilar(ex){
  const c=cat(ex);
  const pool=DB.filter(e=>e.level===S.currentLevel&&!S.seenIds.has(e.id)&&e.id!==ex.id&&cat(e)===c);
  if(pool.length)return pool[Math.floor(Math.random()*pool.length)];
  const fallback=DB.filter(e=>e.level===S.currentLevel&&!S.seenIds.has(e.id)&&e.id!==ex.id&&e.domain===ex.domain);
  return fallback.length?fallback[Math.floor(Math.random()*fallback.length)]:null;
}

// ══════════════════════════════════════════════
//  PROGRESS HELPERS
// ══════════════════════════════════════════════
function lvExs(l){return DB.filter(e=>e.level===l);}
function lvDone(l){return lvExs(l).filter(e=>S.results[e.id]!==undefined).length;}
function lvCorrect(l){return lvExs(l).filter(e=>S.results[e.id]===true).length;}
function togglePreview(){
  S.previewMode = !S.previewMode;
  const btn = document.getElementById('preview-btn');
  btn.textContent = S.previewMode ? '🔒 إلغاء وضع المعاينة' : '🔓 وضع المعاينة — افتح جميع المستويات';
  btn.classList.toggle('active', S.previewMode);
  renderHome();
}

function isUnlocked(l){return l===1 || S.previewMode || lvDone(l-1)>=20;}
function totalDone(){return Object.keys(S.results).length;}
function totalCorrect(){return Object.values(S.results).filter(v=>v===true).length;}

function weakCats(lv){
  const cs=[...new Set(lvExs(lv).map(e=>cat(e)))];
  return cs.filter(c=>{const w=S.weaknesses[c];return w&&w.a>=3&&(w.c/w.a)<0.6;}).map(c=>{
    if(lv===1){const p=c.split(':');const t={0:'طردية',1:'عكسية',2:'تراكمية'};return `${p[0]} (${t[p[1]]||p[1]})`;}
    return c;
  });
}

// ══════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════
function toggleTheme(){S.theme=S.theme==='light'?'dark':'light';applyTheme();save();}
function applyTheme(){
  document.documentElement.setAttribute('data-theme',S.theme);
  document.getElementById('theme-btn').textContent=S.theme==='light'?'🌙 داكن':'☀️ فاتح';
}

// ══════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════
const LCFG=[
  {e:'🌱',t:'بناء المسار الصحيح',d:'مواقف يومية تبني منطقك — من خطوة واحدة لسلسلة كاملة'},
  {e:'🔗',t:'بناء المعادلات',d:'5 مجالات: اقتصاد، فيزياء، كيمياء، رياضيات، منطق'},
  {e:'🧩',t:'علاقات مركبة',d:'علاقات مركّبة وتفكير نقدي في 5 مجالات'},
  {e:'🔢',t:'الحساب بالأرقام',d:'أرقام حقيقية ومواقف من الحياة اليومية'},
  {e:'🏆',t:'مسائل شاملة',d:'مسائل شاملة تجمع مجالين أو أكثر في مسألة واحدة'},
];

function showHome(){
  document.getElementById('home').classList.remove('hidden');
  document.getElementById('exercise').classList.add('hidden');
  document.getElementById('complete').classList.add('hidden');
  renderHome();
}

function renderHome(){
  const done=totalDone(),cor=totalCorrect();
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-cor').textContent=cor;
  document.getElementById('st-pct').textContent=done>0?Math.round(cor/done*100)+'%':'—';
  document.getElementById('st-str').textContent='🔥'+S.streak;

  const g=document.getElementById('levels-grid');g.innerHTML='';
  LCFG.forEach((cfg,i)=>{
    const lv=i+1,unlocked=isUnlocked(lv),done=lvDone(lv),cor=lvCorrect(lv);
    const pct=Math.round(done/30*100);
    const wk=weakCats(lv);
    const card=document.createElement('div');
    card.className='level-card'+(unlocked?'':' locked');
    card.onclick=()=>unlocked&&startLevel(lv);
    card.innerHTML=`
      <div class="lbadge b${lv}">${cfg.e}</div>
      <div class="level-title">المستوى ${lv}: ${cfg.t}</div>
      <div class="level-desc">${cfg.d}</div>
      ${!unlocked?`<div class="lock-msg">🔒 أكملي ${20-lvDone(lv-1)} تمريناً في المستوى ${lv-1} للفتح</div>`:''}
      <div class="lbar"><div class="lbar-fill" style="width:${pct}%"></div></div>
      <div class="lstats"><span>${done}/30 تمرين</span><span>${done>0?Math.round(cor/done*100)+'% صحيح':'—'}</span></div>
      ${wk.length&&unlocked?`<div class="weak-hint">⚠️ ضعف في: ${wk.slice(0,2).join('، ')}</div>`:''}
    `;
    g.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  START LEVEL
// ══════════════════════════════════════════════
function startLevel(lv){
  S.currentLevel=lv;S.queue=buildQueue(lv);S.qIdx=0;S.seenIds=new Set();
  document.getElementById('home').classList.add('hidden');
  document.getElementById('complete').classList.add('hidden');
  document.getElementById('exercise').classList.remove('hidden');
  showEx();
}
function retryLv(){if(S.currentLevel)startLevel(S.currentLevel);}
function backHome(){
  document.getElementById('exercise').classList.add('hidden');
  document.getElementById('complete').classList.add('hidden');
  showHome();
}

// ══════════════════════════════════════════════
//  EXERCISE
// ══════════════════════════════════════════════
let CUR=null;

function getPhaseLabel(ex){
  if(ex.level!==1)return '';
  if(ex.id<=10)return 'المرحلة أ — خطوة واحدة';
  if(ex.id<=15)return 'المرحلة ب — خطوتان';
  return 'المرحلة ج — سلسلة كاملة';
}

function showEx(){
  if(S.qIdx>=S.queue.length){showComplete();return;}
  const id=S.queue[S.qIdx];
  CUR=DB.find(e=>e.id===id);
  if(!CUR){S.qIdx++;showEx();return;}

  const isAdapt=S.seenIds.has(id);
  S.seenIds.add(id);

  // Progress
  const pct=Math.round(S.qIdx/S.queue.length*100);
  document.getElementById('ex-fill').style.width=pct+'%';
  document.getElementById('ex-count').textContent=`${S.qIdx+1} من ${S.queue.length}`;

  // Adaptive badge
  document.getElementById('adapt-wrap').innerHTML=isAdapt?'<div class="adapt-badge">🎯 تمرين تكيّفي لتقوية نقطة ضعف</div>':'';

  // Domain chip
  const d=document.getElementById('ex-domain');
  d.textContent = CUR.domain === 'حياة يومية' ? '🌍 حياة يومية' : CUR.domain;
  d.className=`dchip dc-${CUR.domain==='حياة يومية'?'يومية':CUR.domain}`;

  // Phase badge (level 1 only)
  const phase=getPhaseLabel(CUR);
  const phaseEl=document.getElementById('phase-badge');
  if(phaseEl){phaseEl.textContent=phase;phaseEl.style.display=phase?'inline-block':'none';}

  // Situation (preserve line breaks)
  const sitEl=document.getElementById('ex-sit');
  sitEl.textContent='';
  sitEl.style.whiteSpace='pre-line';
  sitEl.textContent=CUR.situation;

  document.getElementById('ex-q').textContent=CUR.question;

  // Info card (level 1)
  const infoWrap=document.getElementById('info-wrap');
  if(infoWrap){
    if(CUR.info){
      infoWrap.innerHTML=`
        <button class="btn-info" onclick="toggleInfo()">📋 اعرضي المعلومات والقوانين</button>
        <div class="info-card" id="info-card">${CUR.info}</div>`;
    } else {
      infoWrap.innerHTML='';
    }
  }

  // Answer area
  const a=document.getElementById('ex-ans');
  if(CUR.type==='mcq'){
    a.innerHTML='<div class="options" id="opts"></div>';
    const w=document.getElementById('opts');
    CUR.options.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='opt';b.textContent=o;
      b.onclick=()=>doMCQ(i,b);
      w.appendChild(b);
    });
  } else {
    a.innerHTML=`
      <div class="num-wrap">
        <div class="num-row">
          <input type="number" class="num-input" id="ni" placeholder="أدخل الإجابة هنا" step="any">
          ${CUR.unit?`<span class="unit">${CUR.unit}</span>`:''}
        </div>
        <button class="btn-check" id="bchk" onclick="doNum()">تحقق ✓</button>
        <div class="hint-area">
          <button class="btn-hint" onclick="toggleHint()">💡 أحتاج تلميحاً</button>
          <div class="hint-text" id="ht">${CUR.hint||''}</div>
        </div>
      </div>`;
    const ni=document.getElementById('ni');
    ni.addEventListener('keydown',e=>{if(e.key==='Enter')doNum();});
  }

  // Reset feedback
  const fb=document.getElementById('ex-fb');
  fb.className='feedback';fb.style.display='none';
  // Show skip button
  const skip=document.getElementById('btn-skip');
  if(skip) skip.style.display='inline-block';
}

function toggleInfo(){
  const c=document.getElementById('info-card');
  if(c){c.classList.toggle('show');
    const btn=c.previousElementSibling;
    btn.textContent=c.classList.contains('show')?'📋 إخفاء المعلومات':'📋 اعرضي المعلومات والقوانين';
  }
}

function toggleHint(){
  const h=document.getElementById('ht');
  if(h)h.classList.toggle('show');
}

function doMCQ(chosen,btn){
  const ok=chosen===CUR.answer;
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===CUR.answer)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
  });
  handleResult(ok);
}

function doNum(){
  const ni=document.getElementById('ni');
  const val=parseFloat(ni.value);
  if(isNaN(val))return;
  const tol=Math.max(0.001,Math.abs(CUR.answer)*0.01);
  const ok=Math.abs(val-CUR.answer)<=tol;
  ni.disabled=true;ni.classList.add(ok?'correct':'wrong');
  document.getElementById('bchk').disabled=true;
  if(!ok){const h=document.getElementById('ht');if(h)h.classList.add('show');}
  handleResult(ok);
}

function handleResult(ok){
  // Update results
  if(ok){S.results[CUR.id]=true;}
  else if(S.results[CUR.id]===undefined){S.results[CUR.id]=false;}

  recordWeakness(CUR,ok);
  S.streak=ok?S.streak+1:0;

  if(!ok){
    const sim=findSimilar(CUR);
    if(sim&&!S.seenIds.has(sim.id)){
      const ins=Math.min(S.qIdx+4,S.queue.length);
      S.queue.splice(ins,0,sim.id);
    }
  }
  save();

  // Hide skip button when answered
  const skip = document.getElementById('btn-skip');
  if(skip) skip.style.display = 'none';

  // Feedback
  const fb=document.getElementById('ex-fb');
  fb.style.display='block';
  fb.className=`feedback show ${ok?'ok':'err'}`;
  document.getElementById('fb-h').textContent=ok?'✅ إجابة صحيحة!':`❌ الإجابة الصحيحة: ${CUR.answer} ${CUR.unit||''}`;
  document.getElementById('fb-e').textContent=CUR.explanation;
}

function skipEx(){
  // Hide skip button after feedback shown
  const skip = document.getElementById('btn-skip');
  if(skip) skip.style.display = 'none';
  // Move to next without recording result
  S.qIdx++;
  if(S.qIdx >= S.queue.length){ showComplete(); return; }
  showEx();
}

function nextEx(){
  S.qIdx++;
  if(S.qIdx>=S.queue.length){showComplete();return;}
  showEx();
}

// ══════════════════════════════════════════════
//  COMPLETE
// ══════════════════════════════════════════════
function showComplete(){
  document.getElementById('exercise').classList.add('hidden');
  document.getElementById('complete').classList.remove('hidden');

  const done=lvDone(S.currentLevel),cor=lvCorrect(S.currentLevel);
  const pct=done>0?Math.round(cor/done*100):0;

  let icon='🎉',title='استمري في التدريب!';
  if(pct>=90){icon='🏆';title='ممتاز جداً!';}
  else if(pct>=70){icon='🌟';title='أحسنتِ!';}
  else if(pct>=50){icon='💪';title='جيد، استمري!';}

  document.getElementById('c-icon').textContent=icon;
  document.getElementById('c-title').textContent=`المستوى ${S.currentLevel} — ${title}`;
  document.getElementById('c-sub').textContent=`أكملتِ ${done} من 30 تمريناً أصلياً`;
  document.getElementById('c-stars').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('c-score').textContent=`${cor}/${done} صحيح (${pct}%)`;

  const wk=weakCats(S.currentLevel);
  const wd=document.getElementById('c-weak');
  if(wk.length>0){
    wd.innerHTML=`<h3>نقاط تحتاج تقوية:</h3>${wk.map(c=>`<div class="weak-item">• ${c}</div>`).join('')}<div style="margin-top:8px;font-size:.78rem;color:var(--ts)">✨ التطبيق سيُركّز على هذه المجالات تلقائياً في جلستك القادمة.</div>`;
  } else {
    wd.innerHTML=pct>=70?`<div style="color:var(--ok);font-weight:700;text-align:center">✅ أداء ممتاز في جميع المجالات!</div>`:'';
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
load();applyTheme();showHome();
</script>
